# Application Name
spring.application.name=expense-tracker

# Server Port
server.port=8080

# ========================================
# H2 Database Configuration
# ========================================
spring.datasource.url=jdbc:h2:mem:testdb;MODE=MySQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# H2 Console (to see your database in browser)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ========================================
# JPA/Hibernate Configuration
# ========================================
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# Show SQL queries in console
logging.level.org.hibernate.SQL=OFF

# ========================================
# JWT Configuration
# ========================================
# Generate a strong secret for production: openssl rand -hex 32
# The default below is fine for development only.
jwt.secret=${JWT_SECRET:404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970}
# 24 hours in milliseconds (86400 * 1000)
jwt.expiration=86400000

# ========================================
# Spring Security Configuration
# ========================================
# Disables Spring Boot's auto-generated default user
spring.security.user.name=ignored